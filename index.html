<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>录取通知书连续打印系统</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei","微软雅黑","SimSun","宋体",sans-serif;background:#f0f2f5}
.header{background:linear-gradient(135deg,#1a3a5c,#2d6a9f);color:#fff;padding:16px 30px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:20px;font-weight:bold}
.header .controls{display:flex;align-items:center;gap:10px}
.header .controls label{cursor:pointer;background:rgba(255,255,255,.2);padding:8px 14px;border-radius:6px;font-size:13px}
.header .controls input[type="file"]{display:none}
.header .controls .range-wrap{display:flex;align-items:center;gap:4px;font-size:12px;color:rgba(255,255,255,.9)}
.header .controls .range-wrap input{width:44px;padding:4px;border-radius:4px;border:none;text-align:center;font-size:13px}
.header .controls button{background:#27ae60;color:#fff;border:none;padding:8px 14px;border-radius:6px;cursor:pointer;font-size:13px}
.header .controls button:disabled{background:#95a5a6;cursor:not-allowed}
.header .count-badge{font-size:13px;background:rgba(255,255,255,.15);padding:3px 10px;border-radius:10px}
.preview-header{background:#e8edf2;padding:10px 30px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #d0d7de}
.preview-header select{padding:5px 10px;border:1px solid #c0c7ce;border-radius:4px;font-size:13px;max-width:280px}
.preview-header .nav-btns{display:flex;gap:6px}
.preview-header .nav-btns button{padding:5px 12px;border:1px solid #c0c7ce;background:#fff;border-radius:4px;cursor:pointer;font-size:13px}
.preview-header .nav-btns button:disabled{opacity:.4;cursor:default}
.letter-preview{background:#e8edf2;padding:30px;display:flex;justify-content:center;min-height:calc(100vh - 155px);overflow:auto}
.letter-preview .page{width:210mm;min-height:297mm;background:#fff;box-shadow:0 4px 20px rgba(0,0,0,.12)}
@media print{
body{background:#fff!important}
.header,.preview-header,.no-print{display:none!important}
.letter-preview{background:#fff!important;padding:0!important;display:block!important;min-height:auto!important;overflow:visible!important}
.letter-preview .page{box-shadow:none!important;width:100%!important}
}
.letter-content{padding:25.4mm 25mm 20mm;font-family:"SimSun","宋体",serif;color:#1a1a1a;page-break-after:always}
.letter-content .seq-line{font-family:"黑体","SimHei",sans-serif;font-size:11pt;margin-bottom:18px}
.letter-content .title{text-align:center;font-size:18pt;font-family:"华文中宋","STZhongsong",serif;margin-bottom:calc(20px + 0.5em);letter-spacing:1px;line-height:1.6}
.letter-content .body-line{font-size:15pt;line-height:23pt;margin-bottom:0.5em;text-align:center;font-family:"楷体","KaiTi",serif}
.letter-content .body-line .field{display:inline-block;border-bottom:1px solid #333;min-width:60px;text-align:center;padding:0 4px;font-weight:bold;font-family:"楷体","KaiTi","黑体","SimHei","Microsoft YaHei","微软雅黑",sans-serif}
.letter-content .body-line .field-school{min-width:100px}
.letter-content .body-line .field-type{min-width:60px}
.letter-content .normal-text{font-size:15pt;line-height:23pt;text-indent:2em;margin-bottom:6px;margin-top:0.5em}
.letter-content .bold{font-size:15pt;line-height:23pt;font-weight:bold!important;font-family:"楷体","KaiTi","黑体","SimHei","Microsoft YaHei","微软雅黑",sans-serif}
b{font-family:"黑体","SimHei","Microsoft YaHei","微软雅黑",sans-serif;font-weight:normal}
.letter-content .reminder{font-size:15pt;line-height:23pt;margin-bottom:2px;text-indent:2em}
.letter-content .footer-right{text-align:right;font-size:15pt;margin-top:20px}
.letter-content .footer-right .school-name{margin-bottom:6px}
.letter-content .logo-area{text-align:center;margin:6px 0}
.letter-content .logo-area img{max-width:270px}
.letter-content .note-text{font-size:14pt;font-weight:bold;margin-top:10px;font-family:"楷体","KaiTi","黑体","SimHei","Microsoft YaHei","微软雅黑",sans-serif;margin-bottom:1em}
</style>
</head>
<body>
<div class="header no-print">
<h1>录取通知书连续打印系统</h1>
<div class="controls">
<span class="count-badge" id="countBadge">0 条记录</span>
<label for="fileInput">上传 Excel</label>
<input type="file" id="fileInput" accept=".xlsx,.xls">
<span class="range-wrap">
起始 <input type="number" id="startNum" value="1" min="1">
结束 <input type="number" id="endNum" value="1" min="1">
</span>
<button id="printAllBtn" disabled>连续打印</button>
</div>
</div>
<div class="preview-header no-print" id="previewHeader" style="display:none">
<span>选择学生：</span>
<select id="studentSelect"></select>
<div class="nav-btns">
<button id="prevBtn" disabled>上一条</button>
<button id="nextBtn" disabled>下一条</button>
</div>
<span style="margin-left:auto;font-size:13px;color:#666" id="pageInfo"></span>
</div>
<div class="letter-preview" id="previewArea">
<div style="text-align:center;color:#999;margin-top:100px;font-size:16px">
<p style="font-size:40px;margin-bottom:16px"></p>
<p>上传 Excel 文件开始使用</p>
<p style="font-size:13px;margin-top:8px">需包含列：编号、学校、姓名、类型、报到时间</p>
</div>
</div>
<script>
var students=[];var currentIdx=0;
document.getElementById("fileInput").addEventListener("change",function(e){
var file=e.target.files[0];if(!file)return;
var reader=new FileReader();
reader.onload=function(ev){
var data=new Uint8Array(ev.target.result);
var workbook=XLSX.read(data,{type:"array"});
var sheet=workbook.Sheets[workbook.SheetNames[0]];
var json=XLSX.utils.sheet_to_json(sheet);
students=json.map(function(row){return{
编号:String(row["编号"]||row.id||row.ID||""),
学校:String(row["学校"]||row.school||row["就读小学"]||""),
姓名:String(row["姓名"]||row.name||""),
类型:String(row["类型"]||row.type||row["人员类型"]||row["人员类别"]||""),
报到时间:String(row["报到时间"]||row.date||row.time||row["到校时间"]||"")
}});
document.getElementById("countBadge").textContent=students.length+" 条记录";
if(students.length>0){
document.getElementById("previewHeader").style.display="flex";
document.getElementById("printAllBtn").disabled=false;
document.getElementById("endNum").value=students.length;
document.getElementById("endNum").max=students.length;
var sel=document.getElementById("studentSelect");
sel.innerHTML=students.map(function(s,i){return"<option value='"+i+"'>"+s.编号+" - "+s.姓名+"（"+s.学校+"）</option>"}).join("");
currentIdx=0;sel.value="0";renderPreview();updateNav();
}else{
document.getElementById("previewArea").innerHTML="<div style='text-align:center;color:#999;margin-top:100px'><p style='font-size:40px'></p><p>未找到数据，请检查 Excel 列名</p></div>";
}
};
reader.readAsArrayBuffer(file);
});
document.getElementById("studentSelect").addEventListener("change",function(){currentIdx=parseInt(this.value);renderPreview();updateNav();});
document.getElementById("printAllBtn").addEventListener("click",printAll);
function navigate(dir){var n=currentIdx+dir;if(n<0||n>=students.length)return;currentIdx=n;document.getElementById("studentSelect").value=n;renderPreview();updateNav();}
function updateNav(){document.getElementById("prevBtn").disabled=currentIdx<=0;document.getElementById("nextBtn").disabled=currentIdx>=students.length-1;document.getElementById("pageInfo").textContent=(currentIdx+1)+" / "+students.length;}
function renderPreview(){if(!students.length)return;document.getElementById("previewArea").innerHTML="<div class='page'>"+buildContent(students[currentIdx])+"</div>";}
document.getElementById("prevBtn").addEventListener("click",function(){navigate(-1);});
document.getElementById("nextBtn").addEventListener("click",function(){navigate(1);});
function buildContent(s){return"<div class='letter-content'>"+
"<div class='seq-line'>序号 "+s.编号+"<\/div>"+
"<div class='title'>2026年上海市金卫中学预备年级新生入学通知书<\/div>"+
"<div class='body-line'><span class='field field-school'>"+s.学校+"<\/span>&nbsp;&nbsp;&nbsp;<span class='field field-name'>"+s.姓名+"<\/span>&nbsp;同学&nbsp;&nbsp;&nbsp;类型&nbsp;<span class='field field-type'>"+s.类型+"<\/span><\/div>"+
"<div class='normal-text'>祝贺你升入初中学习，欢迎你来上海市金卫中学就读。我校定于7月4日（星期六）"+s.报到时间+"办理预备新生入学报到手续，请你务必带好相关材料，准时来上海市金卫中学报到。<\/div>"+
"<div class='normal-text'><b>报到地点：<\/b>金卫中学（海帆路981号）1号楼3楼1307会议室<\/div>"+
"<div class='normal-text'><b>学生入学需携带的材料：<\/b>本入学通知书<\/div>"+
"<div class='normal-text'><b>友情提醒：<\/b><\/div>"+
"<div class='reminder'>1．若父母一方持有《上海市居住证》，且积分已达标的非本市户籍学生，请提交积分通知单复印件1份。<\/div>"+
"<div class='reminder'>2．若父母一方是上海市户籍的非本市户籍学生，请携带好上海市户籍父母一方的户口本原件及复印件1份、结婚登记证复印件1份。<\/div>"+
"<div class='reminder'>3．请扫码填写\u201C上海市金卫中学学生校服征订意向单\u201D。<\/div>"+
"<div class='logo-area'><img src='outputs/school_logo.png' alt='校徽'><\/div>"+
"<div class='note-text'>备注：本通知也可在\u201C上海市金卫中学\u201D公众号上查询。<\/div>"+
"<div style='margin-top:8px'><\/div>"+
"<div class='footer-right'><div class='school-name'>上海市金卫中学<\/div><div>2026年6月26日<\/div><\/div>"+
"<\/div>";}
function printAll(){
if(!students.length)return;
var si=parseInt(document.getElementById("startNum").value)-1;
var ei=parseInt(document.getElementById("endNum").value);
if(si<0||ei>students.length||si>=ei)return;
var w=window.open("","_blank","width=900,height=700");
var h="<!DOCTYPE html>"+"<html><head><meta charset=\"UTF-8\"><title>录取通知书打印</title><style>"+
"@page{size:A4;margin:0}body{margin:0;padding:0;font-family:'SimSun','宋体',serif;color:#1a1a1a}"+
".letter-content{padding:25.4mm 25mm 20mm;page-break-after:always}.letter-content:last-child{page-break-after:auto}"+
".letter-content .seq-line{font-family:'楷体','KaiTi','黑体','SimHei','Microsoft YaHei','微软雅黑',sans-serif;font-size:11pt;margin-bottom:18px}"+
".letter-content .title{text-align:center;font-size:18pt;font-family:\"华文中宋\",\"STZhongsong\",serif;margin-bottom:calc(20px + 0.5em);letter-spacing:1px;line-height:1.6}"+
".letter-content .body-line{font-size:15pt;line-height:23pt;margin-bottom:0.5em;text-align:center;font-family:'楷体','KaiTi',serif}"+
".letter-content .body-line .field{display:inline-block;border-bottom:1px solid #333;min-width:60px;text-align:center;padding:0 4px;font-weight:bold;font-family:'楷体','KaiTi','黑体','SimHei','Microsoft YaHei','微软雅黑',sans-serif}"+
".letter-content .body-line .field-school{min-width:100px}"+
".letter-content .body-line .field-type{min-width:60px}"+
".letter-content .normal-text{font-size:15pt;line-height:23pt;text-indent:2em;margin-bottom:6px;margin-top:0.5em}"+
".letter-content .bold{font-size:15pt;line-height:23pt;font-weight:bold!important;font-family:'楷体','KaiTi','黑体','SimHei','Microsoft YaHei','微软雅黑',sans-serif}"+
"b{font-family:'黑体','SimHei','Microsoft YaHei','微软雅黑',sans-serif;font-weight:normal}"+
".letter-content .reminder{font-size:15pt;line-height:23pt;margin-bottom:2px;text-indent:2em}"+
".letter-content .footer-right{text-align:right;font-size:15pt;margin-top:20px}"+
".letter-content .footer-right .school-name{margin-bottom:6px}"+
".letter-content .logo-area{text-align:center;margin:6px 0}"+
".letter-content .logo-area img{max-width:270px}"+
".letter-content .note-text{font-size:14pt;font-weight:bold;margin-top:10px;font-family:'楷体','KaiTi','黑体','SimHei','Microsoft YaHei','微软雅黑',sans-serif;margin-bottom:1em}"+
"<\/style><\/head><body>";
for(var i=si;i<ei;i++){h+=buildContent(students[i]);}
h+="</body></html>";w.document.write(h);w.document.close();
setTimeout(function(){w.focus();w.print();},300);
}
</script>
</body>
</html>
